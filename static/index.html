<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicken Joe's Surf Shack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="waves-bg">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
  </div>

  <div class="app">
    <header>
      <div class="header-title">
        <img src="/cj-thumbsup.png" class="logo-img" alt="Chicken Joe" />
        <div>
          <h1>Chicken Joe's Surf Shack</h1>
          <p>🧮 Calculator &nbsp;·&nbsp; 🌊 Web Search &nbsp;·&nbsp; 📖 Knowledge Base</p>
        </div>
      </div>
      <button id="clearBtn">🤙 Wipe Out</button>
    </header>

    <main id="chatContainer">
      <div class="welcome">
        <img src="/cj-surfing.png" class="welcome-img" alt="Chicken Joe surfing" />
        <h2>Duuude, what's up?</h2>
        <p>Hit me with your gnarliest questions, bro</p>
        <div class="chips">
          <button class="chip" onclick="sendText('If a wave is 30 feet tall and I ride 4 waves a day for 7 days, how many total feet of wave have I ridden?')">🧮 Wave math, bro</button>
          <button class="chip" onclick="sendText('Who are the best surfers in the world right now?')">🌊 Who\&#39;s shredding the most?</button>
          <button class="chip" onclick="sendText('What is RAG and how does it stop AI from making stuff up?')">📖 Gnarly AI knowledge</button>
        </div>
      </div>
    </main>

    <footer>
      <div class="input-row">
        <textarea id="input" placeholder="Ask me anything, bro… 🤙" rows="1"></textarea>
        <button id="sendBtn">Send It! 🏄</button>
      </div>
    </footer>
  </div>
  <script src="/app.js"></script>
</body>
</html>
